name: Update Profile Space Shooter

on:
  schedule:
    # Runs every Monday at 6:00 AM IST
    - cron: '30 0 * * 1'
  
  # Allows manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-profile:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout this repository (contains the Python code)
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Generate the game WebP
      - name: Generate game WebP
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python generate_webp.py

      # Step 5: Clone profile repo, update ONLY the WebP file, and push
      # NOTE: This does NOT modify your README.md - only the game.webp file!
      # Your existing README content is fully preserved.
      - name: Update profile repository
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Clone your profile repository
          git clone https://x-access-token:${GH_PAT}@github.com/AnujYadav-Dev/AnujYadav-Dev.git profile-repo
          
          # Copy the generated WebP to profile repo (replaces old file only)
          cp game.webp profile-repo/
          
          # Configure git
          cd profile-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # Commit and push (only if the WebP has changed)
          git add game.webp
          git diff --staged --quiet || git commit -m "🚀 Update space shooter game WebP"
          git push

